# Klipper printer configuration for Anycubic Kobra S1
# CoreXY — 250 x 250 x 250 mm build volume
# Replace placeholder values (marked with <>) with your own measured values.

# =====================================================================
# MCU / serial connection
# =====================================================================
[mcu]
# Find your device with: ls /dev/serial/by-id/
serial: /dev/serial/by-id/<your-mcu-serial-id>
restart_method: command

# =====================================================================
# Printer kinematics
# =====================================================================
[printer]
kinematics: corexy
max_velocity: 500
max_accel: 10000
max_accel_to_decel: 5000
max_z_velocity: 10
max_z_accel: 500
square_corner_velocity: 8.0

# =====================================================================
# Stepper motors — X axis
# =====================================================================
[stepper_x]
step_pin: <step_pin>
dir_pin: <dir_pin>
enable_pin: !<enable_pin>
microsteps: 16
rotation_distance: 40
endstop_pin: ^<endstop_pin>
position_endstop: 0
position_max: 250
homing_speed: 50

# =====================================================================
# Stepper motors — Y axis
# =====================================================================
[stepper_y]
step_pin: <step_pin>
dir_pin: <dir_pin>
enable_pin: !<enable_pin>
microsteps: 16
rotation_distance: 40
endstop_pin: ^<endstop_pin>
position_endstop: 0
position_max: 250
homing_speed: 50

# =====================================================================
# Stepper motors — Z axis (dual Z)
# =====================================================================
[stepper_z]
step_pin: <step_pin>
dir_pin: <dir_pin>
enable_pin: !<enable_pin>
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 250
homing_speed: 10
second_homing_speed: 3

# =====================================================================
# Extruder
# =====================================================================
[extruder]
step_pin: <step_pin>
dir_pin: <dir_pin>
enable_pin: !<enable_pin>
microsteps: 16
rotation_distance: 7.82          # Calibrate using extruder rotation_distance test
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: <heater_pin>
sensor_type: ATC Semitec 104GT-2
sensor_pin: <sensor_pin>
control: pid
pid_kp: 26.213
pid_ki: 1.304
pid_kd: 131.721
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0
pressure_advance: 0.04           # Calibrate per filament

# =====================================================================
# Heated bed
# =====================================================================
[heater_bed]
heater_pin: <heater_pin>
sensor_type: EPCOS 100K B57560G104F
sensor_pin: <sensor_pin>
control: pid
pid_kp: 73.517
pid_ki: 1.431
pid_kd: 944.525
min_temp: 0
max_temp: 115

# =====================================================================
# Fans
# =====================================================================
[fan]
# Part-cooling fan
pin: <fan_pin>

[heater_fan hotend_fan]
pin: <hotend_fan_pin>
heater: extruder
heater_temp: 50.0

[controller_fan electronics_fan]
pin: <controller_fan_pin>
idle_timeout: 60

# =====================================================================
# Probe / auto bed levelling (BLTouch / CR Touch)
# =====================================================================
[bltouch]
sensor_pin: ^<sensor_pin>
control_pin: <control_pin>
x_offset: -30          # Measure and replace with your offset
y_offset: -10          # Measure and replace with your offset
z_offset: 1.80         # Starting value only — run PROBE_CALIBRATE and SAVE_CONFIG to replace this
speed: 5
samples: 2
sample_retract_dist: 3.0

[safe_z_home]
home_xy_position: 155, 135   # Centre of bed accounting for probe offset
speed: 80
z_hop: 10
z_hop_speed: 10

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 35, 20
mesh_max: 220, 230
probe_count: 5, 5
algorithm: bicubic
bicubic_tension: 0.2

# =====================================================================
# TMC2209 drivers (UART mode) — tune per axis
# =====================================================================
[tmc2209 stepper_x]
uart_pin: <uart_pin>
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: <uart_pin>
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: <uart_pin>
run_current: 0.650
stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: <uart_pin>
run_current: 0.650
stealthchop_threshold: 999999

# =====================================================================
# Input shaper — resonance compensation
# =====================================================================
[input_shaper]
# Run SHAPER_CALIBRATE after mounting an accelerometer, then paste results here
shaper_type_x: mzv
shaper_freq_x: 40.0
shaper_type_y: mzv
shaper_freq_y: 36.0

# =====================================================================
# Idle / power management
# =====================================================================
[idle_timeout]
timeout: 1800   # Seconds before steppers and heaters are turned off

# =====================================================================
# Display (optional)
# =====================================================================
# [display]
# lcd_type: st7920
# cs_pin: <cs_pin>
# sclk_pin: <sclk_pin>
# sid_pin: <sid_pin>

# =====================================================================
# Additional includes
# =====================================================================
[include macros.cfg]

