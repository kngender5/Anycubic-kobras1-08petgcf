# Klipper configuration for Anycubic Kobra S1
# CoreXY — build volume 250 x 250 x 250 mm
# Textured PEI bed  |  direct-drive extruder  |  TMC2209 drivers
#
# ──────────────────────────────────────────────────────────────────────────────
# Include files (place alongside this file)
# ──────────────────────────────────────────────────────────────────────────────
[include macros.cfg]

# ──────────────────────────────────────────────────────────────────────────────
# MCU
# ──────────────────────────────────────────────────────────────────────────────
[mcu]
# Adjust the serial path to match your board (run `ls /dev/serial/by-id/` to find it)
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_REPLACE_WITH_YOUR_ID

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 10000
max_z_velocity: 10
max_z_accel: 500
square_corner_velocity: 5.0

# ──────────────────────────────────────────────────────────────────────────────
# Stepper motors
# ──────────────────────────────────────────────────────────────────────────────
[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_max: 250
homing_speed: 50
homing_retract_dist: 0

[stepper_y]
step_pin: PA15
dir_pin: PA8
enable_pin: !PD1
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 0
position_max: 250
homing_speed: 50
homing_retract_dist: 0

[stepper_z]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 250
homing_speed: 8
second_homing_speed: 3

[extruder]
step_pin: PD11
dir_pin: !PD9
enable_pin: !PD13
microsteps: 16
rotation_distance: 4.637          # tune with a calibration cube
nozzle_diameter: 0.800         # update this when swapping nozzles (0.2 / 0.4 / 0.6 / 0.8)
filament_diameter: 1.75
heater_pin: PB3
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA2
min_temp: 0
max_temp: 300
max_extrude_only_distance: 150
pressure_advance: 0.040            # tune per-filament; see docs/Pressure_Advance.md
pressure_advance_smooth_time: 0.04

# ──────────────────────────────────────────────────────────────────────────────
# Heated bed
# ──────────────────────────────────────────────────────────────────────────────
[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
min_temp: 0
max_temp: 110

# ──────────────────────────────────────────────────────────────────────────────
# TMC2209 stepper drivers (UART, sensorless homing)
# ──────────────────────────────────────────────────────────────────────────────
[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.900
stealthchop_threshold: 0
diag_pin: ^PC1
driver_SGTHRS: 100            # tune sensorless homing sensitivity (0–255)

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.900
stealthchop_threshold: 0
diag_pin: ^PC3
driver_SGTHRS: 100

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: PD12
run_current: 0.700
stealthchop_threshold: 0

# ──────────────────────────────────────────────────────────────────────────────
# Probe / bed levelling
# ──────────────────────────────────────────────────────────────────────────────
[probe]
pin: ^PC14
x_offset: 0
y_offset: 0
z_offset: 0.0                  # set with PROBE_CALIBRATE after first boot
speed: 5
lift_speed: 10
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.010
samples_tolerance_retries: 3

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15, 15
mesh_max: 235, 235
fade_start: 0.6
fade_end: 10.0
probe_count: 5, 5
algorithm: bicubic

[safe_z_home]
home_xy_position: 125, 125     # centre of the bed
speed: 100
z_hop: 10
z_hop_speed: 15

# ──────────────────────────────────────────────────────────────────────────────
# Fans
# ──────────────────────────────────────────────────────────────────────────────
[fan]                          # part-cooling fan (controlled by slicer)
pin: PB7

[heater_fan hotend_fan]        # hotend fan — always on when hotend is hot
pin: PB6
heater: extruder
heater_temp: 50.0

[controller_fan controller_fan]
pin: PB5
stepper: stepper_x, stepper_y

# ──────────────────────────────────────────────────────────────────────────────
# Input shaper  (optional — run SHAPER_CALIBRATE after mounting ADXL345)
# ──────────────────────────────────────────────────────────────────────────────
[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 50.0            # replace with measured value
shaper_type_y: mzv
shaper_freq_y: 45.0

# ──────────────────────────────────────────────────────────────────────────────
# Display / extras
# ──────────────────────────────────────────────────────────────────────────────
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[gcode_arcs]
resolution: 0.1

# ──────────────────────────────────────────────────────────────────────────────
# PID tune placeholders — run PID_CALIBRATE HEATER=extruder TARGET=260
# and    PID_CALIBRATE HEATER=heater_bed TARGET=80  then SAVE_CONFIG
# ──────────────────────────────────────────────────────────────────────────────

