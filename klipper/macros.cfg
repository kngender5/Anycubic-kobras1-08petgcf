# Klipper macro definitions for Anycubic Kobra S1
# Included by printer.cfg via [include macros.cfg]
#
# Slicer start G-code (OrcaSlicer):
#   PRINT_START BED_TEMP=[first_layer_bed_temperature] EXTRUDER_TEMP=[first_layer_temperature]
# Slicer end G-code:
#   PRINT_END

# ──────────────────────────────────────────────────────────────────────────────
# PRINT_START
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro PRINT_START]
description: Heat, home, level and purge before printing
gcode:
    {% set bed_temp      = params.BED_TEMP      | default(60)  | int %}
    {% set extruder_temp = params.EXTRUDER_TEMP | default(200) | int %}

    # Heat bed first so levelling happens at print temperature
    M140 S{bed_temp}                         ; start bed heating (no wait)
    M104 S150                                ; preheat nozzle to a safe non-ooze temp
    M190 S{bed_temp}                         ; wait for bed

    G28                                      ; home all axes
    BED_MESH_CALIBRATE                       ; probe and generate bed mesh
    G28 Z                                    ; re-home Z after meshing

    M104 S{extruder_temp}                    ; heat nozzle to print temp
    G0 X125 Y125 Z30 F6000                   ; move to centre while heating
    M109 S{extruder_temp}                    ; wait for nozzle

    PURGE_LINE                               ; lay a purge line before printing
    G92 E0                                   ; reset extruder

# ──────────────────────────────────────────────────────────────────────────────
# PRINT_END
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro PRINT_END]
description: Cool, retract, park, and disable steppers after printing
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = [th.position.x + 20, th.axis_maximum.x - 5] | min %}
    {% set y_safe = [th.position.y + 20, th.axis_maximum.y - 5] | min %}
    {% set z_safe = [th.position.z + 10, th.axis_maximum.z]     | min %}

    G92 E0
    G1 E-2.0 F3600                           ; retract filament
    G0 X{x_safe} Y{y_safe} Z{z_safe} F6000  ; move away from print
    G0 X5 Y{th.axis_maximum.y - 10} F6000   ; park at front-left

    TURN_OFF_HEATERS
    M107                                     ; fans off
    M84                                      ; disable steppers

# ──────────────────────────────────────────────────────────────────────────────
# PURGE_LINE — lay a short nozzle-prime line along the left edge of the bed
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro PURGE_LINE]
description: Prime the nozzle with a short line at the left edge of the bed
gcode:
    G92 E0
    # Z height ≈ 0.75 × nozzle_diameter — adjust for your nozzle (e.g. 0.15 for 0.2 mm, 0.28 for 0.4/0.8 mm)
    G0 X2 Y20  Z0.28 F6000                  ; move to start position
    G1 Y100 E10 F600                         ; extrude purge line
    G1 Y105 E10.5 F600                       ; extend slightly
    G92 E0                                   ; reset extruder
    G0 Z2 F3000                              ; lift before travel

# ──────────────────────────────────────────────────────────────────────────────
# PAUSE / RESUME / CANCEL_PRINT — standard wrappers
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro PAUSE]
description: Pause the running print
rename_existing: PAUSE_BASE
gcode:
    {% set e_retract = params.E | default(1.5) | float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    PAUSE_BASE
    G91
    G1 E-{e_retract} F2100                  ; retract
    G90
    G0 X5 Y{printer.toolhead.axis_maximum.y - 10} F6000  ; park

[gcode_macro RESUME]
description: Resume a paused print
rename_existing: RESUME_BASE
gcode:
    {% set e_retract = params.E | default(1.5) | float %}
    G91
    G1 E{e_retract} F2100                   ; un-retract
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    RESUME_BASE

[gcode_macro CANCEL_PRINT]
description: Cancel the current print
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    M107
    CANCEL_PRINT_BASE
    G28 X Y

# ──────────────────────────────────────────────────────────────────────────────
# Filament change helpers
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro LOAD_FILAMENT]
description: Heat nozzle and load filament
gcode:
    {% set temp = params.TEMP | default(260) | int %}
    M109 S{temp}
    G91
    G1 E60 F400
    G1 E30 F200
    G92 E0
    G90

[gcode_macro UNLOAD_FILAMENT]
description: Heat nozzle and retract filament
gcode:
    {% set temp = params.TEMP | default(260) | int %}
    M109 S{temp}
    G91
    G1 E5  F400
    G1 E-100 F1200
    G92 E0
    G90

# ──────────────────────────────────────────────────────────────────────────────
# Pressure advance shortcuts
# ──────────────────────────────────────────────────────────────────────────────
[gcode_macro SET_PA]
description: Shortcut to set pressure advance — usage: SET_PA PA=0.04
gcode:
    {% set pa = params.PA | default(0.04) | float %}
    SET_PRESSURE_ADVANCE ADVANCE={pa}
