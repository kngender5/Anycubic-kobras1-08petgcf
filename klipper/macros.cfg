# Klipper macros for Anycubic Kobra S1
# Include this file from printer.cfg with:  [include macros.cfg]

# =====================================================================
# PRINT_START
# Called by OrcaSlicer start G-code:
#   PRINT_START BED=[bed_temperature_initial_layer_single] EXTRUDER=[nozzle_temperature_initial_layer]
# =====================================================================
[gcode_macro PRINT_START]
description: Heat bed and nozzle, home, level bed, purge line
gcode:
    {% set BED_TEMP    = params.BED|default(60)|float %}
    {% set NOZZLE_TEMP = params.EXTRUDER|default(205)|float %}
    {% set PREHEAT     = [NOZZLE_TEMP - 30, 150]|min %}  # Preheat nozzle: stay below ooze threshold

    M117 Heating bed...
    M140 S{BED_TEMP}                   # Start bed heating (non-blocking)
    M104 S{PREHEAT}                    # Preheat nozzle (no ooze temp)
    G28                                # Home all axes
    M190 S{BED_TEMP}                   # Wait for bed to reach temperature
    BED_MESH_CALIBRATE                 # Probe and build mesh
    G1 Z5 F3000                        # Lift nozzle before final heat
    M117 Heating nozzle...
    M109 S{NOZZLE_TEMP}                # Wait for nozzle to reach temperature
    PURGE_LINE                         # Draw prime/purge line
    M117 Printing...

# =====================================================================
# PRINT_END
# Called by OrcaSlicer end G-code:  PRINT_END
# =====================================================================
[gcode_macro PRINT_END]
description: Cool down, park printhead, disable heaters and steppers
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = [th.position.x + 20, th.axis_maximum.x - 5]|min %}
    {% set y_safe = [th.position.y + 20, th.axis_maximum.y - 5]|min %}
    {% set z_safe = [th.position.z + 10, th.axis_maximum.z - 5]|min %}

    SAVE_GCODE_STATE NAME=end_state
    G91                                # Relative positioning
    G1 E-1.5 F1800                     # Retract filament
    G1 Z5 F3000                        # Lift Z
    G90                                # Absolute positioning
    G1 X{x_safe} Y{y_safe} Z{z_safe} F6000   # Park printhead
    TURN_OFF_HEATERS
    M107                               # Turn off part-cooling fan
    M84                                # Disable steppers
    BED_MESH_CLEAR                     # Clear mesh data
    RESTORE_GCODE_STATE NAME=end_state
    M117 Print complete!

# =====================================================================
# PURGE_LINE
# Draws a short prime line along the left edge of the bed
# =====================================================================
[gcode_macro PURGE_LINE]
description: Draw a prime/purge line on the left edge of the bed
gcode:
    G92 E0                             # Reset extruder
    G1 X3 Y20 Z0.3 F5000              # Move to purge start
    G1 X3 Y120 E15 F1500              # Draw purge line
    G1 X3.5 Y120 F5000                # Wipe
    G92 E0                             # Reset extruder
    G1 Z2 F3000                        # Lift nozzle

# =====================================================================
# CANCEL_PRINT
# Triggered by Cancel button; runs PRINT_END for a clean shutdown
# =====================================================================
[gcode_macro CANCEL_PRINT]
description: Cancel the current print and park the printhead
gcode:
    PRINT_END

# =====================================================================
# PAUSE
# =====================================================================
[gcode_macro PAUSE]
description: Pause the print and park the nozzle
gcode:
    {% set X_PARK = 10 %}
    {% set Y_PARK = 10 %}
    {% set Z_LIFT = 10 %}
    SAVE_GCODE_STATE NAME=pause_state
    G91
    G1 E-1.5 F1800
    G1 Z{Z_LIFT} F3000
    G90
    G1 X{X_PARK} Y{Y_PARK} F6000
    M117 Paused

# =====================================================================
# RESUME
# =====================================================================
[gcode_macro RESUME]
description: Resume a paused print
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E1.5 F1800                      # Re-prime after park
    G90
    RESTORE_GCODE_STATE NAME=pause_state MOVE=1
    BASE_RESUME
    M117 Resuming...

# =====================================================================
# LOAD_FILAMENT / UNLOAD_FILAMENT
# =====================================================================
[gcode_macro LOAD_FILAMENT]
description: Heat to 220 °C and feed 80 mm of filament
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    M109 S{TEMP}
    G91
    G1 E50 F400
    G1 E30 F200
    G90
    M400
    M117 Filament loaded

[gcode_macro UNLOAD_FILAMENT]
description: Heat to 220 °C, purge, then retract 100 mm
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    M109 S{TEMP}
    G91
    G1 E10 F200                        # Short purge
    G1 E-100 F800                      # Fast unload
    G90
    M400
    M117 Filament unloaded

# =====================================================================
# PID_TUNE_ALL
# Convenience macro to PID-tune hotend and bed in sequence
# =====================================================================
[gcode_macro PID_TUNE_ALL]
description: Run PID autotune for hotend (220 °C) then bed (60 °C)
gcode:
    M117 PID tuning hotend...
    PID_CALIBRATE HEATER=extruder TARGET=220
    M117 PID tuning bed...
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    SAVE_CONFIG
    M117 PID tune complete — config saved

# =====================================================================
# M600 — Filament change (maps to PAUSE)
# =====================================================================
[gcode_macro M600]
description: Filament change — pause and park
gcode:
    PAUSE
    M117 Change filament, then RESUME
